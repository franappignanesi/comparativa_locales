name: Daily full price refresh

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Games per batch"
        required: false
        default: "100"
      max_ms:
        description: "Per-region max runtime in ms"
        required: false
        default: "19800000"
      max_batches:
        description: "Max batches per region"
        required: false
        default: ""
      regions:
        description: "Comma-separated regions to refresh"
        required: false
        default: "AR,MX,ES,PE,CL"
      publish:
        description: "Deploy refreshed data to production"
        required: false
        default: "true"
      steam_live_regions:
        description: "Comma-separated regions where Steam live should override ITAD"
        required: false
        default: ""
  schedule:
    # 05:00 UTC = 02:00 Argentina. Long refresh finishes before daytime traffic.
    - cron: "0 5 * * *"

concurrency:
  group: daily-full-price-refresh
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

permissions:
  contents: read

jobs:
  release-automation:
    name: Discover and promote new games
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    env:
      GLITCHPRICE_PUBLIC_CACHE_SOURCE: file
      RELEASE_DISCOVERY_COUNT: "20"
      RELEASE_PROMOTE_MODE: "fast"
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run worker:release-automation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: catalog-state
          if-no-files-found: ignore
          retention-days: 2
          path: |
            data/game-candidates.json
            data/generated/game-sample.json
            data/generated/pending-releases.json

  refresh-region:
    name: Refresh ${{ matrix.region }}
    runs-on: ubuntu-latest
    timeout-minutes: 355
    needs: release-automation
    if: always()
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        region: [AR, MX, ES, PE, CL]
    env:
      GLITCHPRICE_PUBLIC_CACHE_SOURCE: file
      ITAD_API_KEY: ${{ secrets.ITAD_API_KEY }}
      DIGITAL_VAT_RATE: ${{ secrets.DIGITAL_VAT_RATE }}
      PRICE_REGION: ${{ matrix.region }}
      PRICE_REFRESH_CONCURRENCY: "2"
      FULL_REFRESH_BATCH_SIZE: ${{ inputs.batch_size || '100' }}
      FULL_REFRESH_MAX_MS: ${{ inputs.max_ms || '19800000' }}
      FULL_REFRESH_MAX_BATCHES: ${{ github.event.inputs.max_batches || '' }}
      FULL_REFRESH_RESERVE_MS: "180000"
      FULL_REFRESH_SLEEP_MS: "1000"
      STEAM_LIVE_FALLBACK: ${{ contains(format(',{0},', github.event.inputs.steam_live_regions || ''), format(',{0},', matrix.region)) && '1' || '0' }}
      FULL_REFRESH_ITAD: "1"
      STEAM_CHUNK_SIZE: ${{ matrix.region == 'AR' && '25' || '50' }}
      STEAM_CHUNK_SLEEP_MS: ${{ matrix.region == 'AR' && '250' || '3500' }}
      STEAM_429_RETRIES: "5"
      STEAM_429_BACKOFF_MS: "20000"
      STEAM_REQUEST_TIMEOUT_MS: "12000"
    steps:
      - uses: actions/checkout@v7.0.0
        if: ${{ contains(format(',{0},', github.event.inputs.regions || 'AR,MX,ES,PE,CL'), format(',{0},', matrix.region)) }}
      - uses: actions/download-artifact@v4
        if: ${{ contains(format(',{0},', github.event.inputs.regions || 'AR,MX,ES,PE,CL'), format(',{0},', matrix.region)) }}
        continue-on-error: true
        with:
          name: catalog-state
          path: .
      - uses: actions/setup-node@v6.4.0
        if: ${{ contains(format(',{0},', github.event.inputs.regions || 'AR,MX,ES,PE,CL'), format(',{0},', matrix.region)) }}
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        if: ${{ contains(format(',{0},', github.event.inputs.regions || 'AR,MX,ES,PE,CL'), format(',{0},', matrix.region)) }}
      - run: npm run worker:full-refresh
        if: ${{ contains(format(',{0},', github.event.inputs.regions || 'AR,MX,ES,PE,CL'), format(',{0},', matrix.region)) }}
      - name: Collect region cache
        if: ${{ always() && contains(format(',{0},', github.event.inputs.regions || 'AR,MX,ES,PE,CL'), format(',{0},', matrix.region)) }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p price-cache/data/generated
          if [ "${PRICE_REGION}" = "AR" ]; then
            cp data/generated/latest-prices.json price-cache/data/generated/latest-prices.json
            cp data/generated/price-history.json price-cache/data/generated/price-history.json
            cp data/generated/itad-history.json price-cache/data/generated/itad-history.json 2>/dev/null || true
          else
            cp "data/generated/latest-prices-${PRICE_REGION}.json" "price-cache/data/generated/latest-prices-${PRICE_REGION}.json"
            cp "data/generated/price-history-${PRICE_REGION}.json" "price-cache/data/generated/price-history-${PRICE_REGION}.json"
            cp "data/generated/itad-history-${PRICE_REGION}.json" "price-cache/data/generated/itad-history-${PRICE_REGION}.json" 2>/dev/null || true
          fi
          cp "data/generated/github-full-refresh-status-${PRICE_REGION}.json" "price-cache/data/generated/github-full-refresh-status-${PRICE_REGION}.json" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: ${{ always() && contains(format(',{0},', github.event.inputs.regions || 'AR,MX,ES,PE,CL'), format(',{0},', matrix.region)) }}
        with:
          name: price-cache-${{ matrix.region }}
          if-no-files-found: error
          retention-days: 2
          path: price-cache/

  publish-production:
    name: Build and deploy refreshed data
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [release-automation, refresh-region]
    if: ${{ !cancelled() && needs.refresh-region.result == 'success' && (github.event.inputs.publish || 'true') != 'false' }}
    env:
      GLITCHPRICE_PUBLIC_CACHE_SOURCE: file
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DIGITAL_VAT_RATE: ${{ secrets.DIGITAL_VAT_RATE }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: catalog-state
          path: .
      - uses: actions/download-artifact@v4
        with:
          pattern: price-cache-*
          merge-multiple: true
          path: .
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Prune operational store
        run: npm run worker:prune-operational-store
      - name: Repair transient price gaps
        run: npm run worker:restore-current-prices
      - name: Evaluate wishlist notifications
        continue-on-error: true
        env:
          PRICE_REGIONS: AR,MX,ES,PE,CL
        run: npm run notifications:evaluate
      - name: Guard private generated data
        shell: bash
        run: |
          set -euo pipefail
          for file in data/generated/users.json data/generated/problem-reports.json; do
            if [ -e "$file" ]; then
              echo "Private generated file would be included: $file" >&2
              exit 1
            fi
          done
      - name: Link Vercel project
        shell: bash
        run: |
          set -euo pipefail
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
          mkdir -p .vercel
          node -e "const fs=require('fs'); fs.writeFileSync('.vercel/project.json', JSON.stringify({ orgId: process.env.VERCEL_ORG_ID, projectId: process.env.VERCEL_PROJECT_ID }) + '\n')"
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel production env
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build Vercel artifact
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy refreshed production artifact
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
